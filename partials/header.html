<style>
.site-shell {
  min-height: 100vh;
  background:
    radial-gradient(circle at top right, color-mix(in srgb, var(--color-accent) 18%, transparent), transparent 34%),
    linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-alt) 100%);
  color: var(--text-primary);
  font-family: var(--font-body);
}

.site-header {
  position: sticky;
  top: 0;
  z-index: 30;
  backdrop-filter: blur(18px);
  background: color-mix(in srgb, var(--bg-primary) 86%, transparent);
  border-bottom: 1px solid color-mix(in srgb, var(--color-border) 80%, transparent);
}

.site-header__inner,
.site-footer__inner,
.page-section,
.hero,
.split-grid,
.gallery-grid,
.faq-list,
.contact-grid {
  width: min(100% - 2rem, var(--max-width));
  margin: 0 auto;
}

.site-header__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 1rem 0;
}

.brand-lockup {
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  color: var(--text-primary);
  text-decoration: none;
}

.brand-lockup__mark {
  display: inline-grid;
  place-items: center;
  width: 2.6rem;
  height: 2.6rem;
  border-radius: 999px;
  background: linear-gradient(135deg, var(--color-accent), var(--color-gold));
  color: white;
  font-family: var(--font-headline);
  font-weight: 700;
}

.brand-lockup__text strong,
.brand-lockup__text span {
  display: block;
}

.brand-lockup__text strong {
  font-family: var(--font-headline);
  font-size: 1rem;
}

.brand-lockup__text span {
  color: var(--text-secondary);
  font-size: 0.8rem;
}

.site-nav {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.site-nav__links {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.site-nav__links a,
.site-nav__cta,
.hero__actions a,
.button-link {
  border-radius: 999px;
  padding: 0.75rem 1rem;
  text-decoration: none;
  transition: background var(--transition), color var(--transition), border-color var(--transition), transform var(--transition);
}

.site-nav__links a {
  color: var(--text-secondary);
}

.site-nav__links a:hover,
.site-nav__links a[aria-current="page"] {
  color: var(--text-primary);
  background: color-mix(in srgb, var(--color-accent) 18%, transparent);
}

.site-nav__cta,
.button-link--solid,
.hero__actions .button-link:first-child {
  background: var(--color-accent);
  color: white;
}

.site-nav__cta:hover,
.button-link--solid:hover,
.hero__actions .button-link:first-child:hover {
  background: var(--color-accent-hover);
}

.button-link--ghost,
.hero__actions .button-link:last-child {
  border: 1px solid var(--color-border-light);
  color: var(--text-primary);
}

.button-link--ghost:hover,
.hero__actions .button-link:last-child:hover {
  border-color: var(--color-accent);
  color: var(--color-accent);
}

.site-nav__toggle {
  display: none;
  border: 1px solid var(--color-border-light);
  background: transparent;
  color: var(--text-primary);
  border-radius: 0.9rem;
  padding: 0.7rem 0.85rem;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1rem;
  color: var(--color-gold);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: 0.78rem;
}

.hero {
  display: grid;
  gap: 2rem;
  padding: 4.5rem 0 3rem;
}

.hero__card,
.content-card,
.service-card,
.testimonial-card,
.faq-item,
.contact-card,
.gallery-card,
.stat-card {
  background: color-mix(in srgb, var(--bg-card) 92%, white 8%);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
}

.hero__content h1,
.page-intro h1,
.section-heading h2,
.content-card h2,
.contact-card h2 {
  font-family: var(--font-headline);
  line-height: 1.05;
  margin: 0;
}

.hero__content h1,
.page-intro h1 {
  font-size: clamp(2.8rem, 8vw, 5.4rem);
  max-width: 12ch;
}

.hero__content p,
.page-intro p,
.section-heading p,
.content-card p,
.contact-card p,
.faq-item p,
.testimonial-card p {
  color: var(--text-secondary);
  font-size: 1.05rem;
  line-height: 1.7;
}

.hero__actions,
.cta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.9rem;
  margin-top: 1.5rem;
}

.hero__highlights,
.stats-grid,
.cards-grid,
.testimonial-grid {
  display: grid;
  gap: 1rem;
}

.hero__highlights,
.stats-grid {
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
}

.stat-card,
.hero__card,
.content-card,
.service-card,
.testimonial-card,
.contact-card,
.gallery-card,
.faq-item {
  padding: 1.4rem;
}

.hero__card strong,
.stat-card strong {
  display: block;
  font-family: var(--font-headline);
  font-size: 1.6rem;
  margin-bottom: 0.4rem;
}

.page-section {
  padding: 2rem 0 4rem;
}

.section-heading,
.page-intro {
  margin-bottom: 1.5rem;
}

.cards-grid,
.gallery-grid,
.contact-grid,
.split-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
}

.service-card h3,
.testimonial-card strong,
.gallery-card h3,
.faq-item summary,
.contact-card h3 {
  font-family: var(--font-headline);
}

.service-card p:last-child,
.contact-card ul,
.site-footer ul {
  margin-bottom: 0;
}

.price-pill {
  display: inline-flex;
  padding: 0.35rem 0.7rem;
  border-radius: 999px;
  background: color-mix(in srgb, var(--color-gold) 18%, transparent);
  color: var(--color-gold);
  font-size: 0.85rem;
  font-weight: 600;
}

.gallery-grid {
  display: grid;
  gap: 1rem;
}

.gallery-card__image {
  aspect-ratio: 4 / 3;
  border-radius: calc(var(--radius-lg) - 4px);
  margin-bottom: 1rem;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--color-accent) 50%, white 10%), transparent),
    linear-gradient(45deg, var(--bg-surface), color-mix(in srgb, var(--bg-alt) 70%, black));
}

.faq-list {
  display: grid;
  gap: 1rem;
}

.faq-item summary {
  cursor: pointer;
  list-style: none;
  font-size: 1.1rem;
}

.faq-item summary::-webkit-details-marker {
  display: none;
}

.faq-item[open] summary {
  color: var(--color-accent);
}

.contact-card ul,
.site-footer ul {
  padding: 0;
  list-style: none;
}

.contact-card li,
.site-footer li {
  margin-bottom: 0.65rem;
  color: var(--text-secondary);
}

.site-footer {
  padding: 1rem 0 2.5rem;
  border-top: 1px solid var(--color-border);
  background: color-mix(in srgb, var(--bg-primary) 92%, black);
}

.site-footer__inner {
  display: grid;
  gap: 1.2rem;
  padding-top: 2rem;
}

.site-footer__grid {
  display: grid;
  gap: 1.5rem;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}

.site-footer a {
  color: var(--text-primary);
  text-decoration: none;
}

.site-footer a:hover {
  color: var(--color-accent);
}

.site-footer__meta {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  gap: 1rem;
  color: var(--text-muted);
  font-size: 0.95rem;
}

@media (max-width: 860px) {
  .site-nav__toggle {
    display: inline-flex;
  }

  .site-nav__links {
    position: absolute;
    top: calc(100% + 0.75rem);
    right: 1rem;
    left: 1rem;
    display: none;
    flex-direction: column;
    align-items: stretch;
    padding: 0.75rem;
    border-radius: var(--radius-lg);
    background: color-mix(in srgb, var(--bg-card) 96%, black);
    border: 1px solid var(--color-border);
  }

  .site-nav__links[data-open="true"] {
    display: flex;
  }

  .site-nav__cta {
    display: none;
  }
}
</style>

<div class="site-shell">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand-lockup" href="/index.html">
        <span class="brand-lockup__mark">RB</span>
        <span class="brand-lockup__text">
          <strong data-cms="business.name">R Brothers Outdoor Services</strong>
          <span data-cms="business.tagline">Central NJ Landscaping — Real Prices, Fast Response, No Runaround</span>
        </span>
      </a>

      <nav class="site-nav" aria-label="Primary">
        <button class="site-nav__toggle" type="button" aria-expanded="false" aria-controls="siteNavLinks">
          Menu
        </button>
        <div class="site-nav__links" id="siteNavLinks">
          <a href="/index.html">Home</a>
          <a href="/services.html">Services</a>
          <a href="/about.html">About</a>
          <a href="/gallery.html">Gallery</a>
          <a href="/faq.html">FAQ</a>
          <a href="/contact.html">Contact</a>
        </div>
        <a class="site-nav__cta" href="tel:7328571997">Call Now</a>
      </nav>
    </div>
  </header>

<script>
(function () {
  var current = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.site-nav__links a').forEach(function (link) {
    if (link.getAttribute('href') === '/' + current || (current === '' && link.getAttribute('href') === '/index.html')) {
      link.setAttribute('aria-current', 'page');
    }
  });

  var toggle = document.querySelector('.site-nav__toggle');
  var links = document.getElementById('siteNavLinks');
  if (toggle && links) {
    toggle.addEventListener('click', function () {
      var open = links.getAttribute('data-open') === 'true';
      links.setAttribute('data-open', String(!open));
      toggle.setAttribute('aria-expanded', String(!open));
    });
  }
})();
</script>
